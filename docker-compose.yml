services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_business_builder}
      POSTGRES_USER: ${POSTGRES_USER:-abb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-abb} -d ${POSTGRES_DB:-ai_business_builder}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 10

  ollama-init:
    image: curlimages/curl:8.8.0
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    entrypoint:
      - sh
      - -c
      - |
        for model in llama3 qwen2.5 deepseek-coder phi3; do
          echo "Pulling $$model"
          curl -s http://ollama:11434/api/pull -d "{\"name\":\"$$model\"}" >/dev/null
        done

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - backend/.env
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-abb}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-ai_business_builder}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      OLLAMA_BASE_URL: http://ollama:11434
      FRONTEND_URL: ${APP_BASE_URL:-http://localhost}
      BACKEND_URL: ${API_BASE_URL:-http://localhost}
      TRUSTED_HOSTS: ${TRUSTED_HOSTS:-localhost,127.0.0.1,backend,nginx}
      BROWSER_SESSION_ROOT: /app/.runtime/browser-sessions
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    volumes:
      - backend_uploads:/app/uploads
      - browser_sessions:/app/.runtime/browser-sessions
      - workspace_data:/app/workspace
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready')\""]
      interval: 20s
      timeout: 10s
      retries: 6
      start_period: 30s

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    command: celery -A app.worker worker --loglevel=info -Q default,ai,campaigns,analytics --concurrency=${WORKER_CONCURRENCY:-2}
    env_file:
      - backend/.env
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-abb}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-ai_business_builder}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      OLLAMA_BASE_URL: http://ollama:11434
      BROWSER_SESSION_ROOT: /app/.runtime/browser-sessions
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/uploads
      - browser_sessions:/app/.runtime/browser-sessions
      - workspace_data:/app/workspace

  browser-agent:
    build:
      context: .
      dockerfile: docker/browser-agent/Dockerfile
    restart: unless-stopped
    env_file:
      - backend/.env
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-abb}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-ai_business_builder}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      OLLAMA_BASE_URL: http://ollama:11434
      BROWSER_HEADLESS: "true"
      BROWSER_SESSION_ROOT: /app/.runtime/browser-sessions
    shm_size: "2gb"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/uploads
      - browser_sessions:/app/.runtime/browser-sessions
      - workspace_data:/app/workspace

  beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    command: celery -A app.worker beat --loglevel=info
    env_file:
      - backend/.env
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-abb}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-ai_business_builder}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api/v1}
        NEXT_PUBLIC_PAYPAL_CLIENT_ID: ${NEXT_PUBLIC_PAYPAL_CLIENT_ID:-}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api/v1}
      NEXT_PUBLIC_PAYPAL_CLIENT_ID: ${NEXT_PUBLIC_PAYPAL_CLIENT_ID:-}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 6
      start_period: 20s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - backend_uploads:/var/www/uploads:ro

  prometheus:
    image: prom/prometheus:v2.53.0
    profiles: ["observability"]
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.1.0
    profiles: ["observability"]
    restart: unless-stopped
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"

volumes:
  postgres_data:
  redis_data:
  ollama_data:
  backend_uploads:
  browser_sessions:
  workspace_data:
  prometheus_data:
  grafana_data:
