databases:
  - name: ai-business-builder-db
    databaseName: ai_business_builder
    user: abb
    plan: free
    region: oregon

services:
  # ── Backend API (Render Free ≤ 512MB RAM) ──────────────────────────────────
  - type: web
    name: ai-business-builder-api
    runtime: python
    plan: free
    region: oregon
    autoDeploy: false
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: >
      alembic upgrade head &&
      gunicorn app.main:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    healthCheckPath: /health
    envVars:
      # ── Deployment mode (disables Ollama, browser agent, Celery, heavy workers) ──
      - key: DEPLOYMENT_MODE
        value: render_eval
      - key: APP_ENV
        value: production

      # ── Database (Render PostgreSQL) ──────────────────────────────────────────
      - key: DATABASE_URL
        fromDatabase:
          name: ai-business-builder-db
          property: connectionString

      # ── Redis (optional — uses in-memory fallback when unavailable) ────────────
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: ai-business-builder-cache
          property: connectionString
      - key: REDIS_HEALTHCHECK_ENABLED
        value: "true"

      # ── AI providers (API-based only — Ollama disabled in render_eval) ─────────
      - key: FEATHERLESS_ENABLED
        value: "true"
      - key: FEATHERLESS_BASE_URL
        value: https://api.featherless.ai/v1
      - key: FEATHERLESS_GENERAL_MODEL
        value: deepseek-ai/DeepSeek-V3-0324
      - key: FEATHERLESS_CODING_MODEL
        value: Qwen/Qwen2.5-Coder-32B-Instruct
      - key: FEATHERLESS_REASONING_MODEL
        value: deepseek-ai/DeepSeek-V3-0324
      - key: FEATHERLESS_MARKETING_MODEL
        value: deepseek-ai/DeepSeek-V3-0324
      - key: FEATHERLESS_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: HF_API_KEY
        sync: false

      # ── Security ──────────────────────────────────────────────────────────────
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: SECURE_COOKIES
        value: "true"

      # ── URLs — update FRONTEND_URL to your Vercel deployment ──────────────────
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: TRUSTED_HOSTS
        sync: false

      # ── Payments (sandbox) ────────────────────────────────────────────────────
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
      - key: PAYPAL_ENV
        value: sandbox
      - key: PAYPAL_WEBHOOK_ID
        sync: false

      # ── Email (optional) ──────────────────────────────────────────────────────
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: EMAIL_FROM
        value: noreply@autonomousbusiness.ai
      - key: EMAIL_FROM_NAME
        value: Autonomous Business Builder

      # ── Feature flags (auto-set by DEPLOYMENT_MODE, override if needed) ──────
      - key: ENABLE_OLLAMA
        value: "false"
      - key: ENABLE_BROWSER_AGENT
        value: "false"
      - key: ENABLE_HEAVY_WORKERS
        value: "false"
      - key: ENABLE_API_AI_PROVIDERS
        value: "true"

      # ── Overrides for render_eval safety ──────────────────────────────────────
      - key: BROWSER_HEADLESS
        value: "true"
      - key: OLLAMA_BASE_URL
        value: http://localhost:11434

  - type: keyvalue
    name: ai-business-builder-cache
    plan: free
    region: oregon
    maxmemoryPolicy: noeviction
    ipAllowList: []
