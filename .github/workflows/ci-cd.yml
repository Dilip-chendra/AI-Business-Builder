name: CI-CD

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile backend
        run: python -m compileall app

      - name: Run backend tests
        env:
          APP_ENV: test
          DATABASE_URL: sqlite+aiosqlite:///./ci_test.db
          REDIS_URL: ""
          CELERY_BROKER_URL: ""
          CELERY_RESULT_BACKEND: ""
          JWT_SECRET_KEY: ci-secret-key-for-testing-only
          ENCRYPTION_KEY: L8TfXm-wYy4tE7sRk9Zp1_vQh3_A5bCjO2NlM7gY4wQ=
          FEATHERLESS_ENABLED: "false"
          FEATHERLESS_API_KEY: test-key
          FEATHERLESS_BASE_URL: https://api.featherless.ai/v1
          GROQ_API_KEY: test-key
          HF_API_KEY: ""
          OPENAI_API_KEY: ""
          OLLAMA_BASE_URL: http://localhost:11434
          PAYPAL_CLIENT_ID: sandbox-client-id
          PAYPAL_CLIENT_SECRET: sandbox-client-secret
        run: python -m pytest -q tests

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Lint frontend code
        run: npm run lint

      - name: Build frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
          NEXT_PUBLIC_PAYPAL_CLIENT_ID: sandbox-client-id
        run: npm run build

  containers:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: false
          tags: ai-business-builder/backend:ci

      - name: Build browser-agent image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/browser-agent/Dockerfile
          push: false
          tags: ai-business-builder/browser-agent:ci

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: false
          tags: ai-business-builder/frontend:ci
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost/api/v1
            NEXT_PUBLIC_PAYPAL_CLIENT_ID=sandbox-client-id

  deploy-placeholder:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [containers]
    steps:
      - name: Deployment note
        run: |
          echo "Production deployment should run docker compose pull/build, alembic upgrade head, and rolling restarts on the VPS."
